name: build

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: node20-macos-arm64
            output: timmy-core-macos
          - os: windows-latest
            target: node20-win-x64
            output: timmy-core-win.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Smoke test
        run: node packages/core/dist/index.js
      - name: Package standalone binary
        run: npx @yao-pkg/pkg packages/core/dist/index.js --targets ${{ matrix.target }} --output ${{ matrix.output }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            timmy-core-macos/timmy-core-macos
            timmy-core-win.exe/timmy-core-win.exe
