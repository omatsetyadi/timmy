name: build

# SUPERSEDED for distribution by `release.yml` (Bun single-binary). This `@yao-pkg/pkg` +
# dist/index.js path predates the Bun-compile decision (2026-06-18) and is no longer how Timmy ships;
# kept only as a manual fallback. Prefer `release.yml`. Candidate for removal once Bun is the only path.
#
# Auto-builds are DISABLED to conserve free-tier Actions minutes.
# (Private repo; macOS runners bill at 10x.) Run manually from the Actions tab
# when you need binaries. To re-enable automatic builds, uncomment the push
# triggers below.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: node24-macos-arm64
            output: timmy-core-macos
          - os: windows-latest
            target: node24-win-x64
            output: timmy-core-win.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Smoke test
        run: node packages/core/dist/index.js version
      - name: Package standalone binary
        run: pnpm dlx @yao-pkg/pkg packages/core/dist/index.js --targets ${{ matrix.target }} --output ${{ matrix.output }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            timmy-core-macos/timmy-core-macos
            timmy-core-win.exe/timmy-core-win.exe
