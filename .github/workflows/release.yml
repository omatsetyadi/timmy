name: release

# Cuts a GitHub Release with the prebuilt single binary + SHA256SUMS that `install.sh` fetches.
# Tag-triggered (private repo: macOS runners bill ~10x, so we build on releases only, not every push).
# A manual run (workflow_dispatch) builds + smoke-tests the binary WITHOUT publishing — handy to
# validate the pipeline before tagging.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    # macos-14 is an arm64 runner → produces a native darwin-arm64 binary (the beta target).
    runs-on: macos-14
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.9
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Build the workspace dep first: the bundle imports `timmy-sdk`, which resolves to its built
      # dist/ — absent after a plain install, so the bun compile can't resolve it without this.
      - run: pnpm build

      # Compile the standalone binary (bun:sqlite, embedded keyring/onnx + the Ink TUI — no Node at
      # runtime). Uses build-binary.ts (a Bun.build script) so it can stub Ink's optional
      # react-devtools-core; the plain `bun build --compile` CLI can't and fails to resolve it.
      - name: Build single binary (darwin-arm64)
        working-directory: packages/core
        run: bun build-binary.ts "$GITHUB_WORKSPACE/timmy-darwin-arm64"

      - name: Smoke-test the binary
        run: ./timmy-darwin-arm64 version

      # Compiled-binary smoke — dev-mode runs hid two binary-only bugs: the chat TUI wasn't embedded
      # ("module not found"), and background `start` mis-parsed argv in the bunfs (daemon never ran).
      # Deterministic checks for both (no TTY needed → no hang): the TUI must be IN the binary, and the
      # background daemon must actually come up + serve /health.
      - name: Smoke-test the compiled binary (embedded TUI + start → /health → stop)
        run: |
          strings ./timmy-darwin-arm64 | grep -q "Talk to your machine" || { echo "chat TUI not embedded in the binary"; exit 1; }
          export HOME="$(mktemp -d)"
          mkdir -p "$HOME/.timmy"
          printf 'server: { host: 127.0.0.1, port: 3737, auth: { enabled: false, token: keychain } }\n' > "$HOME/.timmy/config.yaml"
          ./timmy-darwin-arm64 start
          sleep 5
          curl -fsS --max-time 5 http://127.0.0.1:3737/health
          ./timmy-darwin-arm64 stop

      - name: Generate checksums
        run: shasum -a 256 timmy-darwin-arm64 > SHA256SUMS

      # Publish only on a real version tag. A manual dispatch stops here (build validated, nothing shipped).
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            timmy-darwin-arm64
            SHA256SUMS

# Future targets (linux-x64, darwin-x64, linux-arm64): add a build matrix + one binary per runner,
# all uploaded to the same release. Asset names must stay `timmy-<os>-<arch>` to match install.sh.
