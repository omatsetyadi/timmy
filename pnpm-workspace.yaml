packages:
  - packages/sdk
  - packages/core

# Dependencies allowed to run install/build scripts (pnpm 11 blocks these by
# default; this is the v11 `allowBuilds` map that replaced onlyBuiltDependencies).
# esbuild powers tsx (dev hot-reload).
allowBuilds:
  esbuild: true
  better-sqlite3: true
  onnxruntime-node: true # transformers.js in-process embedder (ships prebuilts; allow its postinstall)
  protobufjs: false # transformers.js transitive dep; postinstall not needed
  sharp: false # image lib pulled by transformers.js; unused (we only do text embeddings)

minimumReleaseAgeExclude:
  - better-sqlite3@12.10.1
